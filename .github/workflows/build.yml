name: Barut AI Paketle
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Node.js Kurulumu
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Bagimliliklari Yukle
        run: npm install

      - name: Web Projesini Derle
        run: npm run build

      - name: Android Paketine Cevir (Bubblewrap)
        run: |
          npm install -g @bubblewrap/cli
          # Bu kısım web dosyalarını Android .aab formatına sokar
          # Not: İlk seferde manuel ayar isteyebilir, hata alırsan bana söyle
          
